<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>時態大師：151 隨機收服戰</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Arial', sans-serif; touch-action: none; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: #ffcb05; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; font-size: 20px; }
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; display: none; }
        #score { font-size: 22px; font-weight: bold; color: #ffcb05; text-shadow: 2px 2px 0 #3b4cca; }
        #question-box { background: rgba(255,255,255,0.95); color: #333; padding: 12px; border: 4px solid #3b4cca; border-radius: 8px; margin: 5px 20px; font-size: 17px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: #ffcb05; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; text-align: center; }
        canvas { display: block; image-rendering: pixelated; }
        button { margin-top: 20px; padding: 10px 25px; font-size: 20px; background: #ffcb05; border: none; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="loading">正在召喚 30 隻隨機寶可夢... <br><span id="prog">0</span> / 30</div>
    
    <div id="ui">
        <div id="score">EXP: 0 | 已收服: 0/30</div>
        <div id="question-box"><div id="question">冒險準備中...</div></div>
    </div>

    <div id="win-screen">
        <h1 style="font-size: 45px; text-shadow: 3px 3px 0 #3b4cca;">恭喜！</h1>
        <p style="font-size: 24px; color: #fff;">你已成功通過所有時態考驗</p>
        <h2 style="font-size: 32px; color: #ffcb05;">你現在是真正的「寶可夢大師」！</h2>
        <button onclick="location.reload()">重新冒險</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const questEl = document.getElementById('question');
const loadingEl = document.getElementById('loading');
const progEl = document.getElementById('prog');
const winScreen = document.getElementById('win-screen');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const assets = { ball: new Image(), pokes: [] };
let loadedCount = 0, currentIdx = 0, score = 0, playerX = canvas.width / 2, targets = [], gameActive = false;
const GAME_TOTAL = 30; 

// 📚 100 條全題庫
const pool = [
    {q:"Yesterday, I ____ (go) to school.", a:"went", o:["went","go","gone"]},
    {q:"She ____ (study) every day.", a:"studies", o:["study","studies","studying"]},
    {q:"Look! It ____ (rain) now.", a:"is raining", o:["rains","is raining","rained"]},
    {q:"They ____ (not/see) him yet.", a:"haven't seen", o:["didn't see","haven't seen","not saw"]},
    {q:"I ____ (watch) TV at 8 last night.", a:"was watching", o:["watched","was watching","watch"]},
    {q:"We ____ (finish) it tomorrow.", a:"will finish", o:["finish","will finish","finished"]},
    {q:"He ____ (be) a doctor since 2015.", a:"has been", o:["is","was","has been"]},
    {q:"If it ____ (snow), we'll ski.", a:"snows", o:["snows","snow","will snow"]},
    {q:"Wait! The train ____ (come).", a:"is coming", o:["comes","is coming","came"]},
    {q:"____ (you/buy) the car last week?", a:"Did you buy", o:["Do you buy","Did you buy","Have you bought"]},
    {q:"Water ____ (turn) into ice at 0°C.", a:"turns", o:["turn","turns","turning"]},
    {q:"By 10 PM, I ____ (sleep).", a:"will be sleeping", o:["sleep","will be sleeping","slept"]},
    {q:"I ____ (lose) my key yesterday.", a:"lost", o:["lost","lose","losed"]},
    {q:"She ____ (already/eat) dinner.", a:"has already eaten", o:["already ate","has already eaten","eats"]},
    {q:"Listen! Someone ____ (knock).", a:"is knocking", o:["knocks","is knocking","knocked"]},
    {q:"While I ____ (run), I fell.", a:"was running", o:["ran","was running","run"]},
    {q:"They ____ (live) here for a year.", a:"have lived", o:["lived","live","have lived"]},
    {q:"Tomorrow ____ (be) Monday.", a:"will be", o:["is","was","will be"]},
    {q:"I ____ (not/do) my homework yet.", a:"haven't done", o:["didn't do","haven't done","not do"]},
    {q:"When I arrived, they ____ (leave).", a:"had left", o:["left","had left","have left"]},
    {q:"He ____ (play) guitar every night.", a:"plays", o:["play","plays","playing"]},
    {q:"____ (you/see) the moon now?", a:"Do you see", o:["Do you see","Are you seeing","Did you see"]},
    {q:"It ____ (be) cold last night.", a:"was", o:["is","was","been"]},
    {q:"We ____ (have) lunch when he came.", a:"were having", o:["had","were having","have"]},
    {q:"I ____ (tell) you the truth later.", a:"will tell", o:["tell","will tell","told"]},
    {q:"She ____ (never/be) to Paris.", a:"has never been", o:["is never","was never","has never been"]},
    {q:"The sun ____ (set) in the west.", a:"sets", o:["set","sets","setting"]},
    {q:"____ (she/work) in a bank?", a:"Does she work", o:["Is she work","Does she work","Do she work"]},
    {q:"I ____ (read) 5 books this month.", a:"have read", o:["read","have read","reading"]},
    {q:"By next week, I ____ (finish) it.", a:"will have finished", o:["finish","will finish","will have finished"]},
    {q:"Last year, we ____ (visit) Japan.", a:"visited", o:["visit","visited","visits"]},
    {q:"I ____ (just/buy) a new bike.", a:"have just bought", o:["just bought","have just bought","buy"]},
    {q:"They ____ (play) tennis when it rained.", a:"were playing", o:["played","were playing","play"]},
    {q:"She ____ (speak) French very well.", a:"speaks", o:["speak","speaks","speaking"]},
    {q:"The movie ____ (start) at 8 PM tonight.", a:"starts", o:["start","starts","started"]},
    {q:"I ____ (not/feel) well today.", a:"don't feel", o:["didn't feel","don't feel","not feel"]},
    {q:"Who ____ (invent) the telephone?", a:"invented", o:["invent","invented","invents"]},
    {q:"The children ____ (sleep) right now.", a:"are sleeping", o:["sleep","is sleeping","are sleeping"]},
    {q:"____ (you/ever/be) to New York?", a:"Have you ever been", o:["Did you ever be","Have you ever been","Are you ever"]},
    {q:"I ____ (study) English for three years.", a:"have studied", o:["studied","study","have studied"]},
    {q:"He ____ (forget) his bag yesterday.", a:"forgot", o:["forgot","forget","forgotten"]},
    {q:"Look! The birds ____ (fly).", a:"are flying", o:["fly","are flying","flies"]},
    {q:"I promise I ____ (help) you.", a:"will help", o:["help","will help","helped"]},
    {q:"Ice ____ (melt) at room temperature.", a:"melts", o:["melt","melts","melting"]},
    {q:"If I win, I ____ (buy) a house.", a:"will buy", o:["buy","will buy","bought"]},
    {q:"She ____ (work) here since last July.", a:"has worked", o:["worked","works","has worked"]},
    {q:"What ____ (you/do) at 10 last night?", a:"were you doing", o:["did you do","were you doing","do you do"]},
    {q:"They ____ (go) to the beach every summer.", a:"go", o:["go","goes","going"]},
    {q:"I ____ (already/finish) my work.", a:"have already finished", o:["already finished","have already finished","finishes"]},
    {q:"The earth ____ (go) around the sun.", a:"goes", o:["go","goes","going"]},
    {q:"We ____ (wait) for an hour now.", a:"have been waiting", o:["waited","are waiting","have been waiting"]},
    {q:"My brother ____ (be) born in 2000.", a:"was", o:["is","was","were"]},
    {q:"I ____ (never/eat) sushi before.", a:"have never eaten", o:["never ate","have never eaten","never eat"]},
    {q:"Please be quiet, I ____ (work).", a:"am working", o:["work","am working","worked"]},
    {q:"He ____ (not/come) to the party last night.", a:"didn't come", o:["didn't come","not come","hasn't come"]},
    {q:"The cat ____ (catch) a mouse yesterday.", a:"caught", o:["catch","caught","catches"]},
    {q:"They ____ (travel) around the world next year.", a:"will travel", o:["travel","will travel","traveled"]},
    {q:"____ (you/like) coffee?", a:"Do you like", o:["Are you like","Do you like","Does you like"]},
    {q:"I ____ (see) that movie twice already.", a:"have seen", o:["saw","have seen","see"]},
    {q:"Water ____ (boil) at 100 degrees.", a:"boils", o:["boil","boils","boiling"]},
    {q:"I ____ (read) a book when he called.", a:"was reading", o:["read","was reading","reading"]},
    {q:"She ____ (not/study) now.", a:"is not studying", o:["not study","is not studying","doesn't study"]},
    {q:"They ____ (arrive) late last night.", a:"arrived", o:["arrive","arrived","arrives"]},
    {q:"He ____ (think) he is smart.", a:"thinks", o:["think","thinks","thinking"]},
    {q:"I ____ (know) him for a long time.", a:"have known", o:["know","knew","have known"]},
    {q:"Look at those clouds! It ____ (rain).", a:"is going to rain", o:["rains","is going to rain","rained"]},
    {q:"If I ____ (be) you, I'd go.", a:"were", o:["am","was","were"]},
    {q:"She ____ (clean) the room yesterday.", a:"cleaned", o:["clean","cleaned","cleans"]},
    {q:"The train ____ (leave) at 5 tomorrow.", a:"leaves", o:["leave","leaves","will leave"]},
    {q:"I ____ (write) three letters today.", a:"have written", o:["wrote","have written","write"]},
    {q:"Who ____ (break) the window?", a:"broke", o:["break","broke","broken"]},
    {q:"They ____ (sit) in the garden now.", a:"are sitting", o:["sit","is sitting","are sitting"]},
    {q:"I ____ (go) to the dentist next week.", a:"am going", o:["go","went","am going"]},
    {q:"We ____ (live) here since we were kids.", a:"have lived", o:["lived","live","have lived"]},
    {q:"He ____ (play) football yesterday afternoon.", a:"played", o:["play","played","playing"]},
    {q:"I ____ (not/see) him for weeks.", a:"haven't seen", o:["didn't see","haven't seen","not see"]},
    {q:"Listen! The baby ____ (cry).", a:"is crying", o:["cries","is crying","cry"]},
    {q:"When ____ (you/meet) her?", a:"did you meet", o:["do you meet","did you meet","have you met"]},
    {q:"I ____ (be) busy all day.", a:"have been", o:["am","was","have been"]},
    {q:"She ____ (take) the bus to work.", a:"takes", o:["take","takes","taking"]},
    {q:"They ____ (build) a new house now.", a:"are building", o:["build","is building","are building"]},
    {q:"I ____ (find) my keys under the sofa.", a:"found", o:["find","found","finded"]},
    {q:"____ (it/snow) in winter here?", a:"Does it snow", o:["Is it snow","Does it snow","Do it snow"]},
    {q:"I ____ (buy) this car in 2010.", a:"bought", o:["buy","bought","have bought"]},
    {q:"Wait! I ____ (come) with you.", a:"will come", o:["come","will come","came"]},
    {q:"He ____ (work) in London now.", a:"is working", o:["work","is working","works"]},
    {q:"I ____ (lose) my phone last night.", a:"lost", o:["lost","lose","losed"]},
    {q:"____ (you/hear) that noise just now?", a:"Did you hear", o:["Do you hear","Did you hear","Have you heard"]},
    {q:"She ____ (never/smoke) in her life.", a:"has never smoked", o:["never smoked","has never smoked","never smoke"]},
    {q:"The flowers ____ (need) water.", a:"need", o:["need","needs","needing"]},
    {q:"They ____ (watch) a movie currently.", a:"are watching", o:["watch","is watching","are watching"]},
    {q:"I ____ (send) the email an hour ago.", a:"sent", o:["send","sent","sends"]},
    {q:"He ____ (usually/get up) at 7.", a:"usually gets up", o:["usually get up","usually gets up","get up usually"]},
    {q:"If she ____ (study), she will pass.", a:"studies", o:["study","studies","will study"]},
    {q:"Look! The cat ____ (climb) the tree.", a:"is climbing", o:["climb","is climbing","climbs"]},
    {q:"We ____ (be) friends for years.", a:"have been", o:["are","was","have been"]},
    {q:"I ____ (think) about you all day.", a:"have been thinking", o:["thought","think","have been thinking"]},
    {q:"They ____ (not/finish) the project yet.", a:"haven't finished", o:["didn't finish","haven't finished","not finish"]},
    {q:"The shop ____ (close) at 9 PM.", a:"closes", o:["close","closes","closed"]},
    {q:"____ (you/remember) my name?", a:"Do you remember", o:["Are you remember","Do you remember","Does you remember"]}
];

// 抽取題目
const gameQuestions = pool.sort(() => 0.5 - Math.random()).slice(0, GAME_TOTAL);

function startPreload() {
    assets.ball.src = 'https://raw.githubusercontent.com';
    for (let i = 0; i < GAME_TOTAL; i++) {
        let randomId = Math.floor(Math.random() * 151) + 1;
        let img = new Image();
        img.onload = () => {
            loadedCount++;
            progEl.innerText = loadedCount;
            if (loadedCount === GAME_TOTAL) launchGame();
        };
        img.onerror = img.onload;
        img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${randomId}.png`;
        assets.pokes.push(img);
    }
}

function launchGame() {
    loadingEl.style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    gameActive = true;
    initQuestion();
    requestAnimationFrame(draw);
}

function initQuestion() {
    if (currentIdx >= GAME_TOTAL) { 
        gameActive = false; 
        winScreen.style.display = 'flex'; 
        return; 
    }
    const q = gameQuestions[currentIdx];
    questEl.innerText = `Lv.${currentIdx + 1} 野生寶可夢出現！\n` + q.q;
    
    const step = canvas.width / (q.o.length + 1);
    targets = q.o.map((text, i) => ({
        x: step * (i + 1),
        y: -150,
        text: text,
        img: assets.pokes[currentIdx],
        speed: 2.3 + (currentIdx * 0.08)
    }));
}

const updateX = (e) => { playerX = e.touches ? e.touches.clientX : e.clientX; };
window.addEventListener('mousemove', updateX);
window.addEventListener('touchstart', updateX);
window.addEventListener('touchmove', (e) => { updateX(e); e.preventDefault(); }, {passive: false});

function draw() {
    if (!gameActive) return;
    
    // 背景
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#78C850"; ctx.fillRect(0, canvas.height - 120, canvas.width, 120);

    // 精靈球
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(assets.ball, playerX - 35, canvas.height - 100, 70, 70);

    let next = false;
    targets.forEach(t => {
        t.y += t.speed;
        if (t.img && t.img.complete) ctx.drawImage(t.img, t.x - 50, t.y - 50, 100, 100);

        ctx.font = "bold 18px Arial";
        const tw = ctx.measureText(t.text).width + 30;
        ctx.fillStyle = "white"; ctx.fillRect(t.x - tw/2, t.y + 40, tw, 35);
        ctx.strokeStyle = "#333"; ctx.lineWidth = 3; ctx.strokeRect(t.x - tw/2, t.y + 40, tw, 35);
        ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.fillText(t.text, t.x, t.y + 63);

        if (Math.hypot(t.x - playerX, t.y - (canvas.height - 85)) < 60) {
            if (t.text === gameQuestions[currentIdx].a) {
                currentIdx++;
                score += 100;
                scoreEl.innerText = `EXP: ${score} | 已收服: ${currentIdx}/30`;
                next = true;
            } else {
                gameActive = false;
                alert(`捕捉失敗！正確答案是：${gameQuestions[currentIdx].a}`);
                location.reload();
            }
        }
        if (t.y > canvas.height + 50) next = true;
    });

    if (next) initQuestion();
    requestAnimationFrame(draw);
}

startPreload();
</script>
</body>
</html>
