<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>時態大師：151 隨機收服戰</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Arial', sans-serif; touch-action: none; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: #ffcb05; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; font-size: 20px; }
        #ui { position: absolute; top: 15px; width: 100%; text-align: center; color: #fff; pointer-events: none; z-index: 10; display: none; }
        #score { font-size: 22px; font-weight: bold; color: #ffcb05; text-shadow: 2px 2px 0 #3b4cca; }
        #question-box { background: rgba(255,255,255,0.95); color: #333; padding: 12px; border: 4px solid #3b4cca; border-radius: 8px; margin: 10px 20px; font-size: 17px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #win-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); color: #ffcb05; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; text-align: center; }
        canvas { display: block; image-rendering: pixelated; }
        button { margin-top: 20px; padding: 12px 30px; font-size: 20px; background: #ffcb05; border: none; cursor: pointer; font-weight: bold; border-radius: 8px; color: #3b4cca; box-shadow: 0 4px 0 #b38f00; }
    </style>
</head>
<body>
    <div id="loading">正在召喚 30 隻野生寶可夢... <br><span id="prog">0</span> / 30</div>
    
    <div id="ui">
        <div id="score">EXP: 0 | 已收服: 0/30</div>
        <div id="question-box"><div id="question">尋找目標中...</div></div>
    </div>

    <div id="win-screen">
        <h1 style="font-size: 50px; text-shadow: 4px 4px 0 #3b4cca; margin-bottom: 10px;">恭喜！</h1>
        <p style="font-size: 24px; color: #fff;">你已成功通過 30 場隨機時態戰鬥</p>
        <h2 style="font-size: 32px; color: #ffcb05;">你現在是真正的「寶可夢大師」！</h2>
        <button onclick="location.reload()">重新挑戰</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const questEl = document.getElementById('question');
const loadingEl = document.getElementById('loading');
const progEl = document.getElementById('prog');
const winScreen = document.getElementById('win-screen');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const assets = { ball: new Image(), pokes: [] };
let loadedCount = 0, currentIdx = 0, score = 0, playerX = canvas.width / 2, targets = [], gameActive = false;
const GAME_TOTAL = 30; 

// 📚 題庫池 (隨機抽取 30 題)
const pool = [
    {q:"Yesterday, I ____ (go) to school.", a:"went", o:["went","go","gone"]},
    {q:"She ____ (study) every day.", a:"studies", o:["study","studies","studying"]},
    {q:"Look! It ____ (rain) now.", a:"is raining", o:["rains","is raining","rained"]},
    {q:"They ____ (not/see) him yet.", a:"haven't seen", o:["didn't see","haven't seen","not saw"]},
    {q:"I ____ (watch) TV at 8 last night.", a:"was watching", o:["watched","was watching","watch"]},
    {q:"We ____ (finish) it tomorrow.", a:"will finish", o:["finish","will finish","finished"]},
    {q:"He ____ (be) a doctor since 2015.", a:"has been", o:["is","was","has been"]},
    {q:"If it ____ (snow), we'll ski.", a:"snows", o:["snows","snow","will snow"]},
    {q:"Wait! The train ____ (come).", a:"is coming", o:["comes","is coming","came"]},
    {q:"____ (you/buy) the car last week?", a:"Did you buy", o:["Do you buy","Did you buy","Have you bought"]},
    {q:"Water ____ (turn) into ice at 0°C.", a:"turns", o:["turn","turns","turning"]},
    {q:"By 10 PM, I ____ (sleep).", a:"will be sleeping", o:["sleep","will be sleeping","slept"]},
    {q:"I ____ (lose) my key yesterday.", a:"lost", o:["lost","lose","losed"]},
    {q:"She ____ (already/eat) dinner.", a:"has already eaten", o:["already ate","has already eaten","eats"]},
    {q:"Listen! Someone ____ (knock).", a:"is knocking", o:["knocks","is knocking","knocked"]},
    {q:"While I ____ (run), I fell.", a:"was running", o:["ran","was running","run"]},
    {q:"They ____ (live) here for a year.", a:"have lived", o:["lived","live","have lived"]},
    {q:"Tomorrow ____ (be) Monday.", a:"will be", o:["is","was","will be"]},
    {q:"I ____ (not/do) my homework yet.", a:"haven't done", o:["didn't do","haven't done","not do"]},
    {q:"When I arrived, they ____ (leave).", a:"had left", o:["left","had left","have left"]},
    {q:"He ____ (play) guitar every night.", a:"plays", o:["play","plays","playing"]},
    {q:"____ (you/see) the moon now?", a:"Do you see", o:["Do you see","Are you seeing","Did you see"]},
    {q:"It ____ (be) cold last night.", a:"was", o:["is","was","been"]},
    {q:"We ____ (have) lunch when he came.", a:"were having", o:["had","were having","have"]},
    {q:"I ____ (tell) you the truth later.", a:"will tell", o:["tell","will tell","told"]},
    {q:"She ____ (never/be) to Paris.", a:"has never been", o:["is never","was never","has never been"]},
    {q:"The sun ____ (set) in the west.", a:"sets", o:["set","sets","setting"]},
    {q:"____ (she/work) in a bank?", a:"Does she work", o:["Is she work","Does she work","Do she work"]},
    {q:"I ____ (read) 5 books this month.", a:"have read", o:["read","have read","reading"]},
    {q:"By next week, I ____ (finish) it.", a:"will have finished", o:["finish","will finish","will have finished"]}
    // 你可以按照格式在這裡繼續添加題目到 100 條...
];

// 打亂並抽取題目
const gameQuestions = pool.sort(() => 0.5 - Math.random()).slice(0, GAME_TOTAL);

function startPreload() {
    assets.ball.src = 'https://raw.githubusercontent.com';
    
    for (let i = 0; i < GAME_TOTAL; i++) {
        let randomId = Math.floor(Math.random() * 151) + 1;
        let img = new Image();
        img.onload = () => {
            loadedCount++;
            progEl.innerText = loadedCount;
            if (loadedCount >= GAME_TOTAL) launchGame();
        };
        img.onerror = img.onload;
        // 修正後的路徑
        img.src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${randomId}.png`;
        assets.pokes.push(img);
    }
}

function launchGame() {
    loadingEl.style.display = 'none';
    document.getElementById('ui').style.display = 'block';
    gameActive = true;
    initQuestion();
    requestAnimationFrame(draw);
}

function initQuestion() {
    if (currentIdx >= GAME_TOTAL) { 
        gameActive = false; 
        winScreen.style.display = 'flex'; 
        return; 
    }
    const q = gameQuestions[currentIdx];
    questEl.innerText = `Lv.${currentIdx + 1} 野生寶可夢出現！\n` + q.q;
    
    const step = canvas.width / (q.o.length + 1);
    targets = q.o.map((text, i) => ({
        x: step * (i + 1),
        y: -150,
        text: text,
        img: assets.pokes[currentIdx],
        speed: 2.3 + (currentIdx * 0.08)
    }));
}

const handleInput = (e) => { 
    playerX = e.touches ? e.touches[0].clientX : e.clientX; 
};
window.addEventListener('mousemove', handleInput);
window.addEventListener('touchstart', handleInput);
window.addEventListener('touchmove', (e) => { handleInput(e); e.preventDefault(); }, {passive: false});

function draw() {
    if (!gameActive) return;
    
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height); // 天空
    ctx.fillStyle = "#78C850"; ctx.fillRect(0, canvas.height - 120, canvas.width, 120); // 草地

    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(assets.ball, playerX - 35, canvas.height - 110, 70, 70);

    let next = false;
    targets.forEach(t => {
        t.y += t.speed;
        if (t.img && t.img.complete) ctx.drawImage(t.img, t.x - 50, t.y - 50, 100, 100);

        ctx.font = "bold 18px Arial";
        const tw = ctx.measureText(t.text).width + 30;
        ctx.fillStyle = "white"; ctx.fillRect(t.x - tw/2, t.y + 40, tw, 35);
        ctx.strokeStyle = "#333"; ctx.lineWidth = 3; ctx.strokeRect(t.x - tw/2, t.y + 40, tw, 35);
        ctx.fillStyle = "#000"; ctx.textAlign = "center"; ctx.fillText(t.text, t.x, t.y + 63);

        if (Math.hypot(t.x - playerX, t.y - (canvas.height - 85)) < 60) {
            if (t.text === gameQuestions[currentIdx].a) {
                currentIdx++;
                score += 100;
                scoreEl.innerText = `EXP: ${score} | 已收服: ${currentIdx}/30`;
                next = true;
            } else {
                gameActive = false;
                alert(`捕捉失敗！答案是：${gameQuestions[currentIdx].a}`);
                location.reload();
            }
        }
        if (t.y > canvas.height + 50) next = true;
    });

    if (next) initQuestion();
    requestAnimationFrame(draw);
}

startPreload();
</script>
</body>
</html>
